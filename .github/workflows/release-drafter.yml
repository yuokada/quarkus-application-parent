---
name: Release Drafter

on:
  # pull_request_target event is required for auto-labeler to support PRs from forks
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_pr_labels:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          disable-releaser: ${{ github.event_name == 'pull_request_target' }}
          disable-autolabeler: ${{ github.event_name != 'pull_request_target' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
